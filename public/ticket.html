<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Fest Ticket</title>

<link rel="stylesheet" href="/css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#0b0f1a;
    font-family:Arial;
}

.ticket-card{
    width:300px;
    padding:20px;
    text-align:center;
    border-radius:15px;
    background:#111827;
    color:white;
    border:2px solid #0ff;
}

#qrcode{
    margin:20px auto;
}

button{
    padding:10px 20px;
    border:none;
    background:#00e6e6;
    color:black;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="ticket-card" id="ticket">

<h2>COLLEGE FEST</h2>

<p>Ticket ID: <span id="ticketId"></span></p>

<div id="qrcode"></div>

<p>Show this QR at entry gate</p>

<button onclick="downloadTicket()">Download Ticket</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const ticketID = params.get("ticket");

document.getElementById("ticketId").innerText = ticketID;


// Generate QR
const qr = new QRCode(document.getElementById("qrcode"), {
    text: window.location.origin + "/verify/" + ticketID,
    width: 180,
    height: 180
});


// DOWNLOAD FUNCTION (FIXED)

async function downloadTicket(){

    const ticket = document.getElementById("ticket");

    const qrCanvas = document.querySelector("#qrcode canvas");

    if(qrCanvas){

        const img = document.createElement("img");
        img.src = qrCanvas.toDataURL("image/png");

        img.width = qrCanvas.width;
        img.height = qrCanvas.height;

        const qrContainer = document.getElementById("qrcode");

        qrContainer.innerHTML = "";
        qrContainer.appendChild(img);
    }

    const canvas = await html2canvas(ticket,{
        scale:3,
        useCORS:true
    });

    const link = document.createElement("a");
    link.download = "ticket.png";
    link.href = canvas.toDataURL("image/png");
    link.click();

}

</script>

</body>
</html>
