<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>College Fest Ticket</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;

background:linear-gradient(135deg,#1a1a40,#3c2f70,#6b4fa3);
}

.ticket{

background:black;
padding:40px;
border-radius:20px;

width:350px;
text-align:center;

box-shadow:0 0 20px rgba(0,255,255,0.4);

border:2px solid #00ffff;

}

.title{

color:#00ffff;
font-size:30px;
font-weight:bold;
margin-bottom:20px;

}

.ticketid{

color:white;
font-size:18px;
margin-bottom:20px;

}

.qr{

background:white;
padding:15px;
border-radius:12px;

display:inline-block;

margin-bottom:20px;

}

.qr img{

width:200px;
height:200px;

image-rendering:pixelated;

}

.note{

color:#ccc;
margin-bottom:20px;

}

.download{

background:#49c6d9;
border:none;

padding:14px 25px;
font-size:16px;

border-radius:10px;

cursor:pointer;
font-weight:bold;

}

.download:hover{

background:#37a7b9;

}

</style>

</head>

<body>

<div class="ticket">

<div class="title">
COLLEGE FEST
</div>

<div id="ticketId" class="ticketid">
Ticket ID
</div>

<div class="qr">
<img id="qrImage">
</div>

<div class="note">
Show this QR at entry gate
</div>

<button class="download" onclick="downloadTicket()">
Download Ticket
</button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const ticketId = params.get("id");

document.getElementById("ticketId").innerText =
"Ticket ID: " + ticketId;

const qrUrl =
"https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="
+ encodeURIComponent(ticketId);

document.getElementById("qrImage").src = qrUrl;


function downloadTicket(){

html2canvas(document.querySelector(".ticket"))
.then(canvas=>{

const link=document.createElement("a");

link.download="ticket.png";

link.href=canvas.toDataURL();

link.click();

});

}

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</body>
</html>
