<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>College Fest Ticket</title>

<link rel="stylesheet" href="/css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#0b0f1a;
font-family:Arial;
}

.ticket-card{
width:320px;
padding:25px;
text-align:center;
border-radius:20px;
background:linear-gradient(135deg,#7f7fd5,#86a8e7,#91eae4);
color:white;
}

.title{
font-size:26px;
font-weight:bold;
margin-bottom:10px;
}

.ticket-id{
font-size:18px;
margin-bottom:15px;
}

#qrcode{
margin:15px auto;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
background:#00c9a7;
color:black;
font-weight:bold;
border-radius:10px;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<div class="ticket-card" id="ticket">

<div class="title">
COLLEGE FEST
</div>

<div class="ticket-id">
Ticket ID: <span id="ticketId"></span>
</div>

<div id="qrcode"></div>

<p>Show this QR at entry gate</p>

<button onclick="downloadTicket()">
Download Ticket
</button>

</div>

<script>

/* GET TICKET ID */

const urlParams = new URLSearchParams(window.location.search);
let ticketID = urlParams.get("ticketID") || urlParams.get("id");

if(!ticketID){
const pathParts = window.location.pathname.split("/");
ticketID = pathParts[pathParts.length - 1];
}

/* display ticket id */

document.getElementById("ticketId").innerText = ticketID;


/* GENERATE QR (ONLY TICKET ID - IMPORTANT) */

new QRCode(document.getElementById("qrcode"),{
text: ticketID,
width:140,
height:140
});


/* DOWNLOAD TICKET FIX */

async function downloadTicket(){

const ticket = document.getElementById("ticket");
const qrCanvas = document.querySelector("#qrcode canvas");

if(qrCanvas){

const img=document.createElement("img");
img.src=qrCanvas.toDataURL("image/png");

const qrContainer=document.getElementById("qrcode");

qrContainer.innerHTML="";
qrContainer.appendChild(img);

}

const canvas=await html2canvas(ticket,{
scale:3,
useCORS:true
});

const link=document.createElement("a");
link.download="ticket.png";
link.href=canvas.toDataURL("image/png");
link.click();

}

</script>

</body>
</html>
