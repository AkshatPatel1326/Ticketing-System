<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Ticket</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body{
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.card{
width:420px;
background:#0c0c0c;
border-radius:18px;
padding:40px;
text-align:center;
border:2px solid transparent;

background-image:
linear-gradient(#0c0c0c,#0c0c0c),
linear-gradient(120deg,#00ffe7,#7dff8f,#ffc8ff);

background-origin:border-box;
background-clip:padding-box,border-box;
}

h1{color:#00ffe7;}

#qrcode{
margin-top:20px;
}
</style>

</head>

<body>

<div class="card">

<h1>COLLEGE FEST</h1>

<h3 id="ticketId"></h3>

<canvas id="qrcode"></canvas>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const ticketId = params.get("id");

document.getElementById("ticketId").innerText =
"Ticket ID: " + ticketId;

// IMPORTANT: QR contains ONLY ticketId
QRCode.toCanvas(
document.getElementById("qrcode"),
ticketId
);

</script>

</body>
</html>
