<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Scan Ticket</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.card{
width:420px;
background:#0c0c0c;
border-radius:18px;
padding:40px;
text-align:center;
}

#reader{margin-top:20px;}
</style>

</head>

<body>

<div class="card">

<h2 style="color:#00ffe7">Scan Ticket</h2>

<div id="reader"></div>

<button onclick="startScanner()">Start Scanner</button>

</div>

<script>

function startScanner(){

const scanner = new Html5Qrcode("reader");

scanner.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },

(qrText)=>{

let ticketId = qrText.trim();

// if QR accidentally contains URL
if(ticketId.includes("id=")){
ticketId = ticketId.split("id=")[1];
}

fetch("/verify-ticket",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({ticketId})

})
.then(r=>r.json())
.then(data=>{

if(data.status==="valid"){
alert("Entry Allowed: "+data.name)
}

else if(data.status==="already_used"){
alert("Ticket Already Used")
}

else{
alert("Invalid Ticket")
}

})

}

)

}

</script>

</body>
</html>
