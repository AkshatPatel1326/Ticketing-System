<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let scanner;

function startScanner(){

scanner = new Html5Qrcode("reader");

scanner.start(
{ facingMode: "environment" },
{
fps:10,
qrbox:250
},

(qrText)=>{

// extract ticket id if url
let ticketId = qrText;

if(qrText.includes("ticketId=")){
ticketId = qrText.split("ticketId=")[1];
}

fetch("/verify-ticket",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
ticketId: ticketId
})

})

.then(res=>res.json())

.then(data=>{

if(data.status==="valid"){

alert("✅ Entry Allowed : " + data.name)

}

else if(data.status==="already_used"){

alert("⚠ Ticket Already Used")

}

else{

alert("❌ Invalid Ticket")

}

})

}

)

}

</script>
