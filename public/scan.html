<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Scan Ticket</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
}

.card{
width:420px;
background:#0c0c0c;
border-radius:18px;
padding:40px;
text-align:center;
}

#reader{margin-top:20px;}

/* ===== RESULT SCREEN ===== */

.result{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
font-size:45px;
font-weight:bold;
color:white;
z-index:999;
opacity:0;
transition:0.3s;
}

.green{background:#00c853;}
.orange{background:#ff9100;}
.red{background:#ff1744;}

.show{opacity:1;}

</style>

</head>

<body>

<div class="card">

<h2 style="color:#00ffe7">Scan Ticket</h2>

<div id="reader"></div>

<button onclick="startScanner()">Start Scanner</button>

</div>

<!-- RESULT SCREEN -->

<div id="resultScreen" class="result"></div>

<!-- BEEP SOUND -->

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script>

let scanner;

const resultScreen = document.getElementById("resultScreen");

function showResult(text,color){

resultScreen.className="result "+color+" show";

resultScreen.innerText=text;

setTimeout(()=>{
resultScreen.className="result";
},1500);

}

function startScanner(){

scanner = new Html5Qrcode("reader");

scanner.start(
{ facingMode:"environment" },
{ fps:15, qrbox:250 },

(qrText)=>{

let ticketId = qrText.trim();

// if QR accidentally contains URL
if(ticketId.includes("id=")){
ticketId = ticketId.split("id=")[1];
}

fetch("/verify-ticket",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({ticketId})

})
.then(r=>r.json())
.then(data=>{

if(data.status==="valid"){

document.getElementById("beep").play();

showResult("ENTRY OK","green");

}

else if(data.status==="already_used"){

showResult("ALREADY USED","orange");

}

else{

showResult("INVALID TICKET","red");

}

setTimeout(()=>{
scanner.resume();
},1500);

})

}

)

}

</script>

</body>
</html>
